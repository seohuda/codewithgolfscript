version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Bake the runtime env vars into .env.production so the Next.js
        # server (Amplify SSR Lambda) can read them at runtime. Amplify
        # exposes console-defined variables to the build shell only.
        - env | grep -E '^(NEXT_PUBLIC_SUPABASE_URL|NEXT_PUBLIC_SUPABASE_ANON_KEY|SUPABASE_SERVICE_ROLE_KEY|SESSION_SECRET|PISTON_API_URL)=' >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
